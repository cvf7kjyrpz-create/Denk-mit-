<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pack-App</title>
    <style>
        :root { --bg: #000; --panel: #111; --text: #eee; --green: #2ecc71; --yellow: #f1c40f; --grey: #444; --red: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Feste obere Leiste */
        .fixed-header { padding: 10px; background: var(--bg); border-bottom: 1px solid #333; z-index: 10; }
        
        /* Scrollbarer Bereich */
        #items-container { flex: 1; overflow-y: auto; padding: 10px; }
        
        .container { max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100%; }
        .row-wrapper { background: var(--panel); margin-bottom: 3px; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 6px; height: 32px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .info { flex-grow: 1; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .skip { text-decoration: line-through; opacity: 0.5; }
        button, select, input { background: #222; border: 1px solid #555; color: white; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 0.75em; }
        .controls { display: flex; gap: 3px; align-items: center; }
        .del-btn { background: var(--red); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="fixed-header">
        <div id="stats" style="margin-bottom:5px; font-size: 0.8em;"></div>
        <input type="text" id="search" placeholder="Suchen..." oninput="render()" style="width:100%; box-sizing:border-box; margin-bottom:5px; padding: 5px;">
        <div style="display:flex; gap:3px;">
            <select id="listSelect" onchange="switchList()"></select>
            <button onclick="addList()">+</button>
            <button onclick="resetList()">0</button>
            <button onclick="saveBackup()">Save</button>
            <button onclick="loadBackup()">Load</button>
        </div>
    </div>

    <div id="items-container">
        <div id="items"></div>
        <button onclick="addItem()" style="width:100%; margin-top:5px; padding: 8px;">+ Hinzufügen</button>
    </div>
</div>

<script>
    const packItems = [
        { name: "Handtuch groß", total: 1, packed: 0, status: 'pending' }, { name: "Handtuch klein", total: 2, packed: 0, status: 'pending' },
        { name: "Boxer", total: 8, packed: 0, status: 'pending' }, { name: "Shirt normal", total: 6, packed: 0, status: 'pending' },
        { name: "Shirt bw", total: 8, packed: 0, status: 'pending' }, { name: "Socken schwarz bw", total: 9, packed: 0, status: 'pending' },
        { name: "Socken Sport", total: 8, packed: 0, status: 'pending' }, { name: "Sportanzug bw", total: 1, packed: 0, status: 'pending' },
        { name: "Pullover Bw", total: 3, packed: 0, status: 'pending' }, { name: "Sportanzug normal", total: 2, packed: 0, status: 'pending' },
        { name: "SportSchuhe / Hallenschuhe", total: 1, packed: 0, status: 'pending' }, { name: "Badelatschen", total: 1, packed: 0, status: 'pending' },
        { name: "Combatshirt", total: 3, packed: 0, status: 'pending' }, { name: "Weste / Kobbel", total: 1, packed: 0, status: 'pending' },
        { name: "Ersatzstiefel", total: 2, packed: 0, status: 'pending' }, { name: "Helm", total: 1, packed: 0, status: 'pending' },
        { name: "Barett", total: 1, packed: 0, status: 'pending' }, { name: "Schießbrille", total: 1, packed: 0, status: 'pending' },
        { name: "Sichtschutz Bett", total: 1, packed: 0, status: 'pending' }, { name: "Kleiderbügel", total: 1, packed: 0, status: 'pending' },
        { name: "Handschuhe", total: 1, packed: 0, status: 'pending' }, { name: "Unterhose", total: 3, packed: 0, status: 'pending' },
        { name: "Blaumann", total: 2, packed: 0, status: 'pending' }, { name: "Arbeitsschutzschuhe", total: 1, packed: 0, status: 'pending' },
        { name: "Panzerkombi", total: 1, packed: 0, status: 'pending' }, { name: "Taschenlampe", total: 1, packed: 0, status: 'pending' },
        { name: "Unterlagen SPz", total: 1, packed: 0, status: 'pending' }, { name: "Uniform - Hose und Bluse", total: 1, packed: 0, status: 'pending' },
        { name: "Parker grün", total: 1, packed: 0, status: 'pending' }, { name: "Ersatzmütze / Wintermütze grün / zivil", total: 1, packed: 0, status: 'pending' },
        { name: "Tablet", total: 1, packed: 0, status: 'pending' }, { name: "Wäschesack", total: 1, packed: 0, status: 'pending' },
        { name: "Tee", total: 1, packed: 0, status: 'pending' }, { name: "Steckdose", total: 1, packed: 0, status: 'pending' },
        { name: "Tasse (thermo)", total: 1, packed: 0, status: 'pending' }, { name: "Schlösser", total: 3, packed: 0, status: 'pending' },
        { name: "Ladegerät", total: 1, packed: 0, status: 'pending' }, { name: "Kopfhörer", total: 1, packed: 0, status: 'pending' },
        { name: "Kulturbeutel", total: 1, packed: 0, status: 'pending' }, { name: "Powerbank", total: 1, packed: 0, status: 'pending' },
        { name: "Ersatzbrille", total: 1, packed: 0, status: 'pending' }, { name: "Magnesium", total: 1, packed: 0, status: 'pending' },
        { name: "Taschentücher", total: 1, packed: 0, status: 'pending' }, { name: "Remmi", total: 1, packed: 0, status: 'pending' },
        { name: "Camping Stuhl", total: 1, packed: 0, status: 'pending' }, { name: "Kuscheltier", total: 1, packed: 0, status: 'pending' },
        { name: "Bettwäsche", total: 1, packed: 0, status: 'pending' }, { name: "Waschpad", total: 1, packed: 0, status: 'pending' },
        { name: "Besteck", total: 1, packed: 0, status: 'pending' }, { name: "Teller (Dose grün)", total: 1, packed: 0, status: 'pending' },
        { name: "Nudel Yamyam", total: 1, packed: 0, status: 'pending' }, { name: "Kuli", total: 1, packed: 0, status: 'pending' },
        { name: "Kissen (Normal)", total: 1, packed: 0, status: 'pending' }, { name: "Nachtlicht", total: 1, packed: 0, status: 'pending' },
        { name: "Kopfkissen Luft normal", total: 1, packed: 0, status: 'pending' }, { name: "Luftmatratze + Überzug", total: 1, packed: 0, status: 'pending' },
        { name: "Wasserkocher", total: 1, packed: 0, status: 'pending' }, { name: "Schlafsack", total: 1, packed: 0, status: 'pending' },
        { name: "Meldeblock", total: 1, packed: 0, status: 'pending' }, { name: "Luftmatratze", total: 1, packed: 0, status: 'pending' },
        { name: "Switch, Ladegerät, Spiele", total: 1, packed: 0, status: 'pending' }, { name: "Toilettenpapier feucht", total: 1, packed: 0, status: 'pending' },
        { name: "Creme", total: 1, packed: 0, status: 'pending' }, { name: "Deo Stick", total: 1, packed: 0, status: 'pending' },
        { name: "Duschbad", total: 1, packed: 0, status: 'pending' }, { name: "Head&Shulders", total: 1, packed: 0, status: 'pending' },
        { name: "Uhrenschutz", total: 1, packed: 0, status: 'pending' }, { name: "Rasierer elektrisch", total: 1, packed: 0, status: 'pending' },
        { name: "Zahnbürste / Ladegerät und normale", total: 1, packed: 0, status: 'pending' }, { name: "Kaffeepulver", total: 1, packed: 0, status: 'pending' },
        { name: "Pi-Schnur", total: 1, packed: 0, status: 'pending' }, { name: "Kaugummi", total: 1, packed: 0, status: 'pending' },
        { name: "Zahncreme", total: 1, packed: 0, status: 'pending' }, { name: "Geld", total: 1, packed: 0, status: 'pending' },
        { name: "Waschlappen", total: 1, packed: 0, status: 'pending' }, { name: "Ventilator", total: 1, packed: 0, status: 'pending' },
        { name: "Stöpsel", total: 1, packed: 0, status: 'pending' }
    ];

    const initialTodo = [
        { name: "Yvonne wegen Riester oder was ist da los", status: 'pending' }, { name: "Konserven kaufen", status: 'pending' },
        { name: "StarWars Bilder machen und einstellen", status: 'pending' }, { name: "Überweisung Orthopäde Berlin", status: 'pending' },
        { name: "Lebensversicherung nachfragen, ob auf Yvonne geschrieben", status: 'pending' }, { name: "Silberwert stimmt nicht in der App", status: 'pending' },
        { name: "Hausverwaltung wegen Klingel anrufen", status: 'pending' }, { name: "Microsoft kündigen", status: 'pending' },
        { name: "KI Bild von Puppe die Klamotten trägt", status: 'pending' }, { name: "Herr Reich wegen Nebenkosten", status: 'done' },
        { name: "Joel Paket", status: 'done' }, { name: "Schulden Joel 1125€", status: 'pending' },
        { name: "Sand beschriften", status: 'pending' }, { name: "Mario Allstars", status: 'pending' }
    ];

    let data = JSON.parse(localStorage.getItem('packData')) || { "Übungsplatz": packItems, "To-Do": initialTodo };
    let currentList = Object.keys(data)[0];

    function save() { localStorage.setItem('packData', JSON.stringify(data)); render(); }
    function switchList() { currentList = document.getElementById('listSelect').value; render(); }
    function resetList() { if(confirm("Alles auf 0?")) { data[currentList].forEach(i => { if(i.packed !== undefined) i.packed = 0; i.status = 'pending'; }); save(); } }
    function saveBackup() { prompt("Backup:", JSON.stringify(data)); }
    function loadBackup() { let i = prompt("Einfügen:"); if(i) { data = JSON.parse(i); save(); } }
    function deleteItem(idx) { data[currentList].splice(idx, 1); save(); }

    function updatePacked(idx, delta) {
        let item = data[currentList][idx];
        if (item.total !== undefined) {
            item.packed = Math.max(0, Math.min(item.total, item.packed + delta));
            item.status = (item.packed >= item.total) ? 'done' : 'pending';
        }
        save();
    }

    function toggleSkip(idx) {
        let item = data[currentList][idx];
        item.status = (item.status === 'skip') ? 'pending' : 'skip';
        save();
    }

    function render() {
        let isTodo = (currentList === "To-Do");
        let items = data[currentList].map((item, i) => ({...item, originalIdx: i}));
        items.sort((a, b) => (a.status !== 'pending' ? 1 : -1) - (b.status !== 'pending' ? 1 : -1));
        
        let filtered = items.filter(i => i.name.toLowerCase().includes(document.getElementById('search').value.toLowerCase()));
        
        document.getElementById('items').innerHTML = filtered.map(item => `
            <div class="row-wrapper ${item.status !== 'pending' ? 'skip' : ''}">
                <div class="status-dot" style="background:${item.status=='done'?'var(--green)':(item.status=='skip'?'var(--red)':'var(--yellow)')}"></div>
                <div class="info">${!isTodo ? item.total + 'x ' : ''}${item.name}</div>
                <div class="controls">
                    ${!isTodo ? `
                        <button onclick="updatePacked(${item.originalIdx}, -1)">-</button>
                        <span>${item.packed}/${item.total}</span>
                        <button onclick="updatePacked(${item.originalIdx}, 1)">+</button>
                    ` : ''}
                    <button onclick="toggleSkip(${item.originalIdx})" style="background:var(--grey)">X</button>
                    <button class="del-btn" onclick="deleteItem(${item.originalIdx})">–</button>
                </div>
            </div>
        `).join('');
    }

    function addList() { let n = prompt("Name:"); if(n && !data[n]) { data[n] = []; save(); } }
    function addItem() { let n = prompt("Name:"); if(n) { data[currentList].push({ name:n, status:'pending' }); save(); } }
    
    document.getElementById('listSelect').innerHTML = Object.keys(data).map(l => `<option ${l==currentList?'selected':''}>${l}</option>`).join('');
    render();
</script>
</body>
</html>
