<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pack-App</title>
    <style>
        :root { --bg: #000; --panel: #111; --text: #eee; --green: #2ecc71; --red: #e74c3c; --grey: #444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .row-wrapper { position: relative; overflow: hidden; margin-bottom: 5px; height: 45px; }
        .card { background: var(--panel); padding: 0 10px; height: 40px; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: transform 0.2s; position: absolute; width: 100%; box-sizing: border-box; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
        .info { flex-grow: 1; font-size: 0.9em; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-btn { position: absolute; right: 0; top: 0; bottom: 5px; background: var(--red); color: white; border: none; padding: 0 20px; border-radius: 8px; }
        header { display: flex; gap: 10px; margin-bottom: 15px; }
        select { flex-grow: 1; background: var(--panel); color: white; padding: 8px; border: 1px solid #333; border-radius: 4px; }
        button { background: #222; border: 1px solid #555; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <select id="listSelect" onchange="switchList()"></select>
        <button onclick="addList()">+</button>
    </header>
    <div id="items"></div>
    <button onclick="addItem()" style="width: 100%; margin-top: 15px;">+ Gegenstand hinzufügen</button>
</div>

<script>
    const initialItems = [
        { name: "Handtuch groß", total: 1, packed: 0, status: 'pending' }, { name: "Handtuch klein", total: 2, packed: 0, status: 'pending' },
        { name: "Boxer", total: 8, packed: 0, status: 'pending' }, { name: "Shirt normal", total: 6, packed: 0, status: 'pending' },
        { name: "Shirt bw", total: 8, packed: 0, status: 'pending' }, { name: "Socken schwarz bw", total: 9, packed: 0, status: 'pending' },
        { name: "Socken Sport", total: 8, packed: 0, status: 'pending' }, { name: "Sportanzug bw", total: 1, packed: 0, status: 'pending' },
        { name: "Pullover Bw", total: 3, packed: 0, status: 'pending' }, { name: "Sportanzug normal", total: 2, packed: 0, status: 'pending' },
        { name: "SportSchuhe / Hallenschuhe", total: 1, packed: 0, status: 'pending' }, { name: "Badelatschen", total: 1, packed: 0, status: 'pending' },
        { name: "Combatshirt", total: 3, packed: 0, status: 'pending' }, { name: "Weste / Kobbel", total: 1, packed: 0, status: 'pending' },
        { name: "Ersatzstiefel", total: 2, packed: 0, status: 'pending' }, { name: "Helm", total: 1, packed: 0, status: 'pending' },
        { name: "Barett", total: 1, packed: 0, status: 'pending' }, { name: "Schießbrille", total: 1, packed: 0, status: 'pending' },
        { name: "Sichtschutz Bett", total: 1, packed: 0, status: 'pending' }, { name: "Kleiderbügel", total: 1, packed: 0, status: 'pending' },
        { name: "Handschuhe", total: 1, packed: 0, status: 'pending' }, { name: "Unterhose", total: 3, packed: 0, status: 'pending' },
        { name: "Blaumann", total: 2, packed: 0, status: 'pending' }, { name: "Arbeitsschutzschuhe", total: 1, packed: 0, status: 'pending' },
        { name: "Panzerkombi", total: 1, packed: 0, status: 'pending' }, { name: "Taschenlampe", total: 1, packed: 0, status: 'pending' },
        { name: "Unterlagen SPz", total: 1, packed: 0, status: 'pending' }, { name: "Uniform - Hose und Bluse", total: 1, packed: 0, status: 'pending' },
        { name: "Parker grün", total: 1, packed: 0, status: 'pending' }, { name: "Ersatzmütze / Wintermütze", total: 1, packed: 0, status: 'pending' },
        { name: "Tablet", total: 1, packed: 0, status: 'pending' }, { name: "Wäschesack", total: 1, packed: 0, status: 'pending' },
        { name: "Tee", total: 1, packed: 0, status: 'pending' }, { name: "Steckdose", total: 1, packed: 0, status: 'pending' },
        { name: "Tasse (thermo)", total: 1, packed: 0, status: 'pending' }, { name: "Schlösser", total: 3, packed: 0, status: 'pending' },
        { name: "Ladegerät", total: 1, packed: 0, status: 'pending' }, { name: "Kopfhörer", total: 1, packed: 0, status: 'pending' },
        { name: "Kulturbeutel", total: 1, packed: 0, status: 'pending' }, { name: "Powerbank", total: 1, packed: 0, status: 'pending' },
        { name: "Ersatzbrille", total: 1, packed: 0, status: 'pending' }, { name: "Magnesium", total: 1, packed: 0, status: 'pending' },
        { name: "Taschentücher", total: 1, packed: 0, status: 'pending' }, { name: "Remmi", total: 1, packed: 0, status: 'pending' },
        { name: "Camping Stuhl", total: 1, packed: 0, status: 'pending' }, { name: "Kuscheltier", total: 1, packed: 0, status: 'pending' },
        { name: "Bettwäsche", total: 1, packed: 0, status: 'pending' }, { name: "Waschpad", total: 1, packed: 0, status: 'pending' },
        { name: "Besteck", total: 1, packed: 0, status: 'pending' }, { name: "Teller (Dose grün)", total: 1, packed: 0, status: 'pending' },
        { name: "Nudel Yamyam", total: 1, packed: 0, status: 'pending' }, { name: "Kuli", total: 1, packed: 0, status: 'pending' },
        { name: "Kissen (Normal)", total: 1, packed: 0, status: 'pending' }, { name: "Nachtlicht", total: 1, packed: 0, status: 'pending' },
        { name: "Kopfkissen Luft normal", total: 1, packed: 0, status: 'pending' }, { name: "Luftmatratze + Überzug", total: 1, packed: 0, status: 'pending' },
        { name: "Wasserkocher", total: 1, packed: 0, status: 'pending' }, { name: "Schlafsack", total: 1, packed: 0, status: 'pending' },
        { name: "Meldeblock", total: 1, packed: 0, status: 'pending' }, { name: "Luftmatratze", total: 1, packed: 0, status: 'pending' },
        { name: "Switch, Ladegerät, Spiele", total: 1, packed: 0, status: 'pending' }, { name: "Toilettenpapier feucht", total: 1, packed: 0, status: 'pending' },
        { name: "Creme", total: 1, packed: 0, status: 'pending' }, { name: "Deo Stick", total: 1, packed: 0, status: 'pending' },
        { name: "Duschbad", total: 1, packed: 0, status: 'pending' }, { name: "Head&Shulders", total: 1, packed: 0, status: 'pending' },
        { name: "Uhrenschutz", total: 1, packed: 0, status: 'pending' }, { name: "Rasierer elektrisch", total: 1, packed: 0, status: 'pending' },
        { name: "Zahnbürste", total: 1, packed: 0, status: 'pending' }, { name: "Kaffeepulver", total: 1, packed: 0, status: 'pending' },
        { name: "Pi-Schnur", total: 1, packed: 0, status: 'pending' }, { name: "Kaugummi", total: 1, packed: 0, status: 'pending' },
        { name: "Zahncreme", total: 1, packed: 0, status: 'pending' }, { name: "Geld", total: 1, packed: 0, status: 'pending' },
        { name: "Waschlappen", total: 1, packed: 0, status: 'pending' }, { name: "Ventilator", total: 1, packed: 0, status: 'pending' },
        { name: "Stöpsel", total: 1, packed: 0, status: 'pending' }
    ];

    let data = JSON.parse(localStorage.getItem('packData')) || { "Übungsplatz": initialItems, "To-Do": [] };
    let currentList = Object.keys(data)[0];

    function save() { localStorage.setItem('packData', JSON.stringify(data)); render(); }
    function switchList() { currentList = document.getElementById('listSelect').value; render(); }

    function toggleStatus(idx) {
        const s = ['pending', 'done', 'missing', 'skip'];
        let item = data[currentList][idx];
        item.status = s[(s.indexOf(item.status) + 1) % 4];
        save();
    }

    function editItem(idx) {
        let item = data[currentList][idx];
        let n = prompt("Name:", item.name);
        if (n !== null) item.name = n;
        let t = prompt("Gesamtmenge:", item.total);
        if (t !== null) item.total = parseInt(t) || 1;
        save();
    }

    function render() {
        let listDiv = document.getElementById('items');
        document.getElementById('listSelect').innerHTML = Object.keys(data).map(l => `<option ${l==currentList?'selected':''}>${l}</option>`).join('');
        
        listDiv.innerHTML = data[currentList].map((item, idx) => `
            <div class="row-wrapper">
                <div class="card" id="card-${idx}" ontouchstart="ts(event, ${idx})" ontouchend="te(event, ${idx})">
                    <div class="status-dot" style="background:var(--${item.status=='done'?'green':item.status=='missing'?'red':item.status=='skip'?'grey':'grey'})" onclick="toggleStatus(${idx})"></div>
                    <div class="info" onclick="editItem(${idx})">${item.total}x ${item.name}</div>
                </div>
                <button class="del-btn" onclick="data[currentList].splice(${idx},1); save()">Löschen</button>
            </div>
        `).join('');
    }

    let tx = 0;
    function ts(e, i) { tx = e.touches[0].clientX; }
    function te(e, i) { if (tx - e.changedTouches[0].clientX > 50) document.getElementById('card-'+i).style.transform = 'translateX(-80px)'; else document.getElementById('card-'+i).style.transform = 'translateX(0)'; }

    function addList() { let n = prompt("Name:"); if (n && !data[n]) { data[n] = []; save(); } }
    function addItem() { let n = prompt("Gegenstand:"); if (n) { data[currentList].push({ name:n, total:1, status:'pending' }); save(); } }
    render();
</script>
</body>
</html>
