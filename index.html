<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minimal Pack</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        header { display: flex; gap: 10px; margin-bottom: 20px; }
        select { flex-grow: 1; background: #111; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 4px; }
        .item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; }
        .info { flex-grow: 1; cursor: pointer; }
        .done { text-decoration: line-through; opacity: 0.4; }
        .controls { display: flex; align-items: center; gap: 10px; }
        button { background: #111; border: 1px solid #333; color: #888; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .del { color: #500; font-size: 0.8em; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <select id="listSelect" onchange="switchList()"></select>
        <button onclick="addList()">+</button>
    </header>
    <div id="items"></div>
    <button onclick="addItem()" style="width: 100%; margin-top: 20px; padding: 10px;">+ Hinzufügen</button>
</div>

<script>
    const initialItems = [
        { name: "Handtuch groß", total: 1, packed: 0, done: false }, { name: "Handtuch klein", total: 2, packed: 2, done: false },
        { name: "Boxer", total: 8, packed: 2, done: false }, { name: "Shirt normal", total: 6, packed: 6, done: false },
        { name: "Shirt bw", total: 8, packed: 0, done: false }, { name: "Socken schwarz bw", total: 9, packed: 0, done: false },
        { name: "Socken Sport", total: 8, packed: 4, done: false }, { name: "Sportanzug bw", total: 1, packed: 1, done: false },
        { name: "Pullover Bw", total: 3, packed: 1, done: false }, { name: "Sportanzug normal", total: 2, packed: 1, done: false },
        { name: "SportSchuhe / Hallenschuhe", total: 1, packed: 1, done: false }, { name: "Badelatschen", total: 1, packed: 1, done: false },
        { name: "Combatshirt", total: 3, packed: 0, done: false }, { name: "Weste / Kobbel", total: 1, packed: 0, done: false },
        { name: "Ersatzstiefel", total: 2, packed: 1, done: false }, { name: "Helm", total: 1, packed: 0, done: false },
        { name: "Barett", total: 1, packed: 1, done: false }, { name: "Schießbrille", total: 1, packed: 0, done: false },
        { name: "Sichtschutz Bett", total: 1, packed: 0, done: false }, { name: "Kleiderbügel", total: 1, packed: 1, done: false },
        { name: "Handschuhe", total: 1, packed: 0, done: false }, { name: "Unterhose", total: 3, packed: 0, done: false },
        { name: "Blaumann", total: 2, packed: 1, done: false }, { name: "Arbeitsschutzschuhe", total: 1, packed: 0, done: false },
        { name: "Panzerkombi", total: 1, packed: 1, done: false }, { name: "Taschenlampe", total: 1, packed: 0, done: false },
        { name: "Unterlagen SPz", total: 1, packed: 0, done: false }, { name: "Uniform - Hose/Bluse", total: 1, packed: 0, done: false },
        { name: "Parker grün", total: 1, packed: 1, done: false }, { name: "Ersatzmütze", total: 1, packed: 1, done: false },
        { name: "Tablet", total: 1, packed: 0, done: false }, { name: "Wäschesack", total: 1, packed: 1, done: false },
        { name: "Tee", total: 1, packed: 0, done: false }, { name: "Steckdose", total: 1, packed: 1, done: false },
        { name: "Tasse (thermo)", total: 1, packed: 0, done: false }, { name: "Schlösser", total: 3, packed: 2, done: false },
        { name: "Ladegerät", total: 1, packed: 0, done: false }, { name: "Kopfhörer", total: 1, packed: 0, done: false },
        { name: "Kulturbeutel", total: 1, packed: 0, done: false }, { name: "Powerbank", total: 1, packed: 0, done: false },
        { name: "Ersatzbrille", total: 1, packed: 1, done: false }, { name: "Magnesium", total: 1, packed: 0, done: false },
        { name: "Taschentücher", total: 1, packed: 0, done: false }, { name: "Remmi", total: 1, packed: 0, done: false },
        { name: "Camping Stuhl", total: 1, packed: 1, done: false }, { name: "Kuscheltier", total: 1, packed: 0, done: false },
        { name: "Bettwäsche", total: 1, packed: 0, done: false }, { name: "Waschpad", total: 1, packed: 0, done: false },
        { name: "Besteck", total: 1, packed: 0, done: false }, { name: "Teller (Dose grün)", total: 1, packed: 0, done: false },
        { name: "Nudel Yamyam", total: 1, packed: 0, done: false }, { name: "Kuli", total: 1, packed: 1, done: false },
        { name: "Kissen (Normal)", total: 1, packed: 0, done: false }, { name: "Nachtlicht", total: 1, packed: 1, done: false },
        { name: "Kopfkissen Luft", total: 1, packed: 0, done: false }, { name: "Luftmatratze", total: 1, packed: 0, done: false },
        { name: "Wasserkocher", total: 1, packed: 1, done: false }, { name: "Schlafsack", total: 0, packed: 0, done: false },
        { name: "Meldeblock", total: 1, packed: 0, done: false }, { name: "Switch/Spiele", total: 1, packed: 0, done: false },
        { name: "Toilettenpapier feucht", total: 1, packed: 0, done: false }, { name: "Creme", total: 1, packed: 0, done: false },
        { name: "Deo Stick", total: 1, packed: 0, done: false }, { name: "Duschbad", total: 1, packed: 0, done: false },
        { name: "Head&Shulders", total: 1, packed: 0, done: false }, { name: "Uhrenschutz", total: 1, packed: 0, done: false },
        { name: "Rasierer elektrisch", total: 1, packed: 0, done: false }, { name: "Zahnbürste", total: 1, packed: 0, done: false },
        { name: "Kaffeepulver", total: 1, packed: 0, done: false }, { name: "Pi-Schnur", total: 1, packed: 1, done: false },
        { name: "Kaugummi", total: 1, packed: 0, done: false }
    ];

    let data = JSON.parse(localStorage.getItem('packData')) || { "Übungsplatz": initialItems, "To-Do": [] };
    let currentList = Object.keys(data)[0];

    function save() { localStorage.setItem('packData', JSON.stringify(data)); render(); }
    function switchList() { currentList = document.getElementById('listSelect').value; render(); }

    function toggleDone(idx) {
        let item = data[currentList][idx];
        item.done = !item.done;
        save();
    }

    function render() {
        let isTodo = currentList.toLowerCase().includes('to-do');
        let listDiv = document.getElementById('items');
        let sel = document.getElementById('listSelect');
        
        sel.innerHTML = Object.keys(data).map(l => `<option ${l==currentList?'selected':''}>${l}</option>`).join('');
        
        listDiv.innerHTML = data[currentList].map((item, idx) => `
            <div class="item">
                <div class="info ${item.done ? 'done' : ''}" onclick="isTodo ? toggleDone(${idx}) : editItem(${idx})">
                    ${item.name} ${!isTodo ? `<span style="opacity:0.5; margin-left:10px">${item.packed}/${item.total}</span>` : ''}
                </div>
                ${!isTodo ? `
                    <div class="controls">
                        <button onclick="updatePacked(${idx}, -1)">-</button>
                        <button onclick="updatePacked(${idx}, 1)">+</button>
                    </div>` : ''}
                <span class="del" onclick="data[currentList].splice(${idx},1); save()">✕</span>
            </div>
        `).join('');
    }

    function updatePacked(idx, delta) {
        let item = data[currentList][idx];
        item.packed = Math.max(0, Math.min(item.total, item.packed + delta));
        save();
    }

    function editItem(idx) {
        let item = data[currentList][idx];
        let n = prompt("Name:", item.name);
        if (n !== null) item.name = n;
        let t = prompt("Gesamtmenge:", item.total);
        if (t !== null) item.total = parseInt(t) || 1;
        save();
    }

    function addList() { 
        let n = prompt("Name der neuen Liste:"); 
        if (n && !data[n]) { data[n] = []; save(); } 
    }

    function addItem() { 
        let n = prompt("Bezeichnung:"); 
        if (n) { data[currentList].push({ name:n, total:1, packed:0, done:false }); save(); } 
    }

    render();
</script>
</body>
</html>
